name: CD

on:
  push:
    branches: [main]

env:
  EC2_APP_DIR: /home/ubuntu/dailog

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: SSH 키 준비
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: 코드를 EC2로 전송 (rsync)
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude 'node_modules' --exclude '.env' --exclude 'dist' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ env.EC2_APP_DIR }}/

      - name: 배포 실행
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ env.EC2_APP_DIR }}
            cat > .env <<'ENVEOF'
            ${{ secrets.PROD_ENV_FILE }}
            ENVEOF
            set -a
            source .env
            set +a
            npm ci
            npm run build
            bash scripts/backup-db.sh
            npm run migration:run
            pm2 startOrReload ecosystem.config.js --update-env
