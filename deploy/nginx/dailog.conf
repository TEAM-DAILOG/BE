# EC2에 /etc/nginx/sites-available/dailog.conf 로 복사 후
# /etc/nginx/sites-enabled/dailog.conf 로 심볼릭 링크 걸어서 사용
# HTTPS는 EC2에서 certbot --nginx -d dailog.kro.kr 실행하면 443 블록이 자동으로 추가됨

server {
    listen 80;
    server_name dailog.kro.kr;

    location / {
        proxy_pass http://localhost:8000; # BACKEND_PORT과 동일하게 유지
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
